openapi: 3.0.3
info:
  title: OpenAI-Compatible API
  description: |
    OpenAI-compatible REST API covering chat completions (with streaming + tool calling),
    legacy completions, embeddings, and model listing. Drop-in compatible with the
    `openai` Python/Node SDKs by setting `base_url` to this server.
  version: "1.0.0"
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.example.com/v1
    description: Production
  - url: http://localhost:8000/v1
    description: Local

security:
  - BearerAuth: []

tags:
  - name: Chat
    description: Chat completion endpoints (primary).
  - name: Completions
    description: Legacy text completions.
  - name: Embeddings
    description: Vector embeddings.
  - name: Models
    description: Model discovery.

paths:
  /chat/completions:
    post:
      tags: [Chat]
      summary: Create a chat completion
      description: |
        Creates a model response for the given chat conversation.
        Set `stream: true` to receive a stream of `text/event-stream` chunks
        terminated by a `data: [DONE]` sentinel.
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatCompletionRequest"
      responses:
        "200":
          description: |
            Successful completion. Returns a `ChatCompletionResponse` for non-streaming
            requests, or a `text/event-stream` of `ChatCompletionChunk` events when
            `stream=true`.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatCompletionResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/ChatCompletionChunk"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/ServerError" }

  /completions:
    post:
      tags: [Completions]
      summary: Create a (legacy) text completion
      operationId: createCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompletionRequest"
      responses:
        "200":
          description: Successful completion.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
            text/event-stream:
              schema:
                $ref: "#/components/schemas/CompletionResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/ServerError" }

  /embeddings:
    post:
      tags: [Embeddings]
      summary: Create embeddings
      operationId: createEmbedding
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmbeddingRequest"
      responses:
        "200":
          description: Successful embedding response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmbeddingResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "429": { $ref: "#/components/responses/RateLimited" }
        "500": { $ref: "#/components/responses/ServerError" }

  /models:
    get:
      tags: [Models]
      summary: List available models
      operationId: listModels
      responses:
        "200":
          description: A list of model objects.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelList"
        "401": { $ref: "#/components/responses/Unauthorized" }

  /models/{model}:
    get:
      tags: [Models]
      summary: Retrieve a model
      operationId: retrieveModel
      parameters:
        - name: model
          in: path
          required: true
          schema: { type: string }
          example: gpt-4o-mini
      responses:
        "200":
          description: Model object.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Model"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API key

  responses:
    BadRequest:
      description: Invalid request.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    Unauthorized:
      description: Missing or invalid API key.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    RateLimited:
      description: Rate limit exceeded.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }
    ServerError:
      description: Internal server error.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorResponse" }

  schemas:
    # ---------- Errors ----------
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, type]
          properties:
            message: { type: string }
            type: { type: string, example: invalid_request_error }
            param: { type: string, nullable: true }
            code: { type: string, nullable: true }

    # ---------- Chat ----------
    ChatCompletionRequest:
      type: object
      required: [model, messages]
      properties:
        model:
          type: string
          example: gpt-4o-mini
        messages:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ChatMessage" }
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
        top_p:
          type: number
          minimum: 0
          maximum: 1
          default: 1
        n:
          type: integer
          minimum: 1
          default: 1
        stream:
          type: boolean
          default: false
        stream_options:
          type: object
          nullable: true
          properties:
            include_usage: { type: boolean, default: false }
        stop:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string }, maxItems: 4 }
          nullable: true
        max_tokens:
          type: integer
          minimum: 1
          nullable: true
        max_completion_tokens:
          type: integer
          minimum: 1
          nullable: true
        presence_penalty:
          type: number
          minimum: -2
          maximum: 2
          default: 0
        frequency_penalty:
          type: number
          minimum: -2
          maximum: 2
          default: 0
        logit_bias:
          type: object
          additionalProperties: { type: number }
          nullable: true
        logprobs:
          type: boolean
          default: false
        top_logprobs:
          type: integer
          minimum: 0
          maximum: 20
          nullable: true
        user:
          type: string
        seed:
          type: integer
          nullable: true
        response_format:
          $ref: "#/components/schemas/ResponseFormat"
        tools:
          type: array
          items: { $ref: "#/components/schemas/Tool" }
        tool_choice:
          $ref: "#/components/schemas/ToolChoice"
        parallel_tool_calls:
          type: boolean
          default: true

    ChatMessage:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool, developer]
        content:
          oneOf:
            - { type: string, nullable: true }
            - type: array
              items: { $ref: "#/components/schemas/ContentPart" }
        name:
          type: string
        tool_calls:
          type: array
          items: { $ref: "#/components/schemas/ToolCall" }
        tool_call_id:
          type: string
          description: Required when role is "tool".

    ContentPart:
      oneOf:
        - $ref: "#/components/schemas/TextContentPart"
        - $ref: "#/components/schemas/ImageContentPart"
      discriminator:
        propertyName: type
        mapping:
          text: "#/components/schemas/TextContentPart"
          image_url: "#/components/schemas/ImageContentPart"

    TextContentPart:
      type: object
      required: [type, text]
      properties:
        type: { type: string, enum: [text] }
        text: { type: string }

    ImageContentPart:
      type: object
      required: [type, image_url]
      properties:
        type: { type: string, enum: [image_url] }
        image_url:
          type: object
          required: [url]
          properties:
            url:
              type: string
              description: HTTPS URL or `data:` URI (base64).
            detail:
              type: string
              enum: [auto, low, high]
              default: auto

    ResponseFormat:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [text, json_object, json_schema]
          default: text
        json_schema:
          type: object
          description: Required when type is `json_schema`.
          properties:
            name: { type: string }
            description: { type: string }
            schema: { type: object, additionalProperties: true }
            strict: { type: boolean, default: false }

    Tool:
      type: object
      required: [type, function]
      properties:
        type: { type: string, enum: [function] }
        function:
          type: object
          required: [name]
          properties:
            name: { type: string }
            description: { type: string }
            parameters:
              type: object
              additionalProperties: true
              description: JSON Schema describing the function arguments.
            strict: { type: boolean, default: false }

    ToolChoice:
      oneOf:
        - type: string
          enum: [none, auto, required]
        - type: object
          required: [type, function]
          properties:
            type: { type: string, enum: [function] }
            function:
              type: object
              required: [name]
              properties:
                name: { type: string }

    ToolCall:
      type: object
      required: [id, type, function]
      properties:
        id: { type: string }
        type: { type: string, enum: [function] }
        function:
          type: object
          required: [name, arguments]
          properties:
            name: { type: string }
            arguments:
              type: string
              description: JSON-encoded string of arguments.

    ChatCompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id: { type: string, example: chatcmpl-abc123 }
        object: { type: string, enum: [chat.completion] }
        created: { type: integer, description: Unix timestamp (seconds). }
        model: { type: string }
        system_fingerprint: { type: string, nullable: true }
        choices:
          type: array
          items:
            type: object
            required: [index, message, finish_reason]
            properties:
              index: { type: integer }
              message: { $ref: "#/components/schemas/ChatMessage" }
              logprobs:
                type: object
                nullable: true
              finish_reason:
                type: string
                enum: [stop, length, tool_calls, content_filter, function_call]
        usage:
          $ref: "#/components/schemas/Usage"

    ChatCompletionChunk:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id: { type: string }
        object: { type: string, enum: [chat.completion.chunk] }
        created: { type: integer }
        model: { type: string }
        system_fingerprint: { type: string, nullable: true }
        choices:
          type: array
          items:
            type: object
            required: [index, delta]
            properties:
              index: { type: integer }
              delta:
                type: object
                properties:
                  role: { type: string, enum: [system, user, assistant, tool] }
                  content: { type: string, nullable: true }
                  tool_calls:
                    type: array
                    items:
                      type: object
                      properties:
                        index: { type: integer }
                        id: { type: string }
                        type: { type: string, enum: [function] }
                        function:
                          type: object
                          properties:
                            name: { type: string }
                            arguments: { type: string }
              finish_reason:
                type: string
                nullable: true
                enum:
                  [
                    stop,
                    length,
                    tool_calls,
                    content_filter,
                    function_call,
                    null,
                  ]
        usage:
          $ref: "#/components/schemas/Usage"

    # ---------- Legacy completions ----------
    CompletionRequest:
      type: object
      required: [model, prompt]
      properties:
        model: { type: string }
        prompt:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string } }
        max_tokens: { type: integer, default: 16 }
        temperature: { type: number, default: 1 }
        top_p: { type: number, default: 1 }
        n: { type: integer, default: 1 }
        stream: { type: boolean, default: false }
        logprobs: { type: integer, nullable: true }
        echo: { type: boolean, default: false }
        stop:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string }, maxItems: 4 }
          nullable: true
        presence_penalty: { type: number, default: 0 }
        frequency_penalty: { type: number, default: 0 }
        best_of: { type: integer, default: 1 }
        logit_bias:
          type: object
          additionalProperties: { type: number }
          nullable: true
        user: { type: string }
        suffix: { type: string, nullable: true }
        seed: { type: integer, nullable: true }

    CompletionResponse:
      type: object
      required: [id, object, created, model, choices]
      properties:
        id: { type: string }
        object: { type: string, enum: [text_completion] }
        created: { type: integer }
        model: { type: string }
        choices:
          type: array
          items:
            type: object
            required: [text, index, finish_reason]
            properties:
              text: { type: string }
              index: { type: integer }
              logprobs: { type: object, nullable: true }
              finish_reason:
                type: string
                enum: [stop, length, content_filter]
        usage:
          $ref: "#/components/schemas/Usage"

    # ---------- Embeddings ----------
    EmbeddingRequest:
      type: object
      required: [model, input]
      properties:
        model: { type: string, example: text-embedding-3-small }
        input:
          oneOf:
            - { type: string }
            - { type: array, items: { type: string } }
            - { type: array, items: { type: integer } }
            - { type: array, items: { type: array, items: { type: integer } } }
        encoding_format:
          type: string
          enum: [float, base64]
          default: float
        dimensions:
          type: integer
          minimum: 1
          nullable: true
        user:
          type: string

    EmbeddingResponse:
      type: object
      required: [object, data, model, usage]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items:
            type: object
            required: [object, embedding, index]
            properties:
              object: { type: string, enum: [embedding] }
              index: { type: integer }
              embedding:
                oneOf:
                  - { type: array, items: { type: number } }
                  - { type: string, description: base64-encoded float32 array. }
        model: { type: string }
        usage:
          type: object
          required: [prompt_tokens, total_tokens]
          properties:
            prompt_tokens: { type: integer }
            total_tokens: { type: integer }

    # ---------- Models ----------
    Model:
      type: object
      required: [id, object, created, owned_by]
      properties:
        id: { type: string, example: gpt-4o-mini }
        object: { type: string, enum: [model] }
        created: { type: integer }
        owned_by: { type: string, example: organization-owner }

    ModelList:
      type: object
      required: [object, data]
      properties:
        object: { type: string, enum: [list] }
        data:
          type: array
          items: { $ref: "#/components/schemas/Model" }

    # ---------- Shared ----------
    Usage:
      type: object
      required: [prompt_tokens, completion_tokens, total_tokens]
      properties:
        prompt_tokens: { type: integer }
        completion_tokens: { type: integer }
        total_tokens: { type: integer }
        prompt_tokens_details:
          type: object
          properties:
            cached_tokens: { type: integer }
        completion_tokens_details:
          type: object
          properties:
            reasoning_tokens: { type: integer }
